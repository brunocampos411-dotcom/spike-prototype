<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revela — Marketplace de Talentos do Vôlei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0D0D;
    --bg-2: #141414;
    --bg-3: #1A1A1A;
    --bg-card: #161616;
    --border: #232323;
    --border-light: #2A2A2A;
    --text: #F2F2F0;
    --text-muted: #6B6B6B;
    --text-sub: #9A9A9A;
    --accent: #FF5C1A;
    --accent-dim: rgba(255,92,26,0.12);
    --green: #22C55E;
    --red: #EF4444;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4, .syne {
    font-family: 'Syne', sans-serif;
  }

  /* ─── NAV ─── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 60px;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-logo span {
    color: var(--accent);
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
  }

  .nav-tab {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 150ms ease;
    letter-spacing: 0.02em;
  }

  .nav-tab:hover {
    color: var(--text);
    background: var(--bg-3);
  }

  .nav-tab.active {
    color: var(--text);
    background: var(--bg-3);
    border: 1px solid var(--border-light);
  }

  .nav-badge {
    font-size: 10px;
    background: var(--accent);
    color: white;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 500;
    margin-left: 4px;
  }

  /* ─── PANELS ─── */
  .panel {
    display: none;
    min-height: calc(100vh - 60px);
  }
  .panel.active {
    display: block;
  }

  /* ─── HOME ─── */
  .home-hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 100px 40px 80px;
    text-align: left;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    border: 1px solid var(--accent-dim);
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--accent-dim);
  }

  .hero-headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(48px, 6vw, 80px);
    line-height: 1.0;
    letter-spacing: -2px;
    color: var(--text);
    margin-bottom: 28px;
  }

  .hero-headline em {
    font-style: normal;
    color: var(--accent);
  }

  .hero-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 18px;
    line-height: 1.7;
    color: var(--text-sub);
    max-width: 540px;
    margin-bottom: 48px;
  }

  .cta-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 150ms ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary:hover {
    background: #FF7040;
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 14px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 150ms ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-outline:hover {
    border-color: var(--text-sub);
    color: var(--text);
  }

  /* Metrics */
  .metrics-bar {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 56px 40px;
    display: flex;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  .metric-item {
    flex: 1;
    max-width: 280px;
    padding: 0 48px;
    position: relative;
  }

  .metric-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 10%;
    height: 80%;
    width: 1px;
    background: var(--border);
  }

  .metric-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
    display: block;
    margin-bottom: 8px;
  }

  .metric-num span {
    color: var(--accent);
  }

  .metric-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Steps */
  .steps-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 40px;
  }

  .section-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  .steps-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .step-card {
    background: var(--bg-card);
    padding: 36px 32px;
    transition: background 150ms ease;
  }

  .step-card:hover {
    background: var(--bg-3);
  }

  .step-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .step-icon {
    width: 40px;
    height: 40px;
    background: var(--bg-3);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 18px;
    color: var(--text-sub);
  }

  .step-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .step-desc {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ─── VITRINE ─── */
  .vitrine-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  .vitrine-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .vitrine-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    padding-right: 8px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 150ms ease;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--bg-3);
    border-color: var(--border-light);
    color: var(--text);
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .athletes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .athlete-card {
    background: var(--bg-card);
    cursor: pointer;
    transition: background 150ms ease;
    position: relative;
    overflow: hidden;
  }

  .athlete-card:hover {
    background: var(--bg-3);
  }

  .athlete-card.expanded {
    grid-column: 1 / -1;
    background: var(--bg-2);
    cursor: default;
  }

  .card-thumb {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    position: relative;
    overflow: hidden;
  }

  .card-body {
    padding: 16px;
  }

  .athlete-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .pills-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .pill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border-light);
    color: var(--text-sub);
    background: var(--bg-3);
    letter-spacing: 0.02em;
  }

  .pill.pos { border-color: rgba(255,92,26,0.3); color: var(--accent); background: var(--accent-dim); }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .meta-info {
